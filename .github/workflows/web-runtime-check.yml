# Headless browser checks: HTTP status + console errors + failed requests.
# Commits data/latest-runtime-check.json so the dashboard can load results from the same repo.

name: Web app runtime check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *' # daily 10:00 UTC

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: monitor
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Extract URLs from dashboard
        working-directory: monitor
        run: npm run extract

      - name: Run smoke tests
        id: smoke
        working-directory: monitor
        continue-on-error: true
        run: npm test

      - name: Commit runtime report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-runtime-check.json
          if git diff --staged --quiet; then
            echo "No changes to report"
          else
            git commit -m "chore: update latest-runtime-check.json [skip ci]"
            git push
          fi

      - name: Fail job if runtime scan failed
        if: steps.smoke.outcome != 'success'
        run: exit 1
